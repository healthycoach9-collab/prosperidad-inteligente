<div class="container">
    <article>
        <h1>Calculadora de Inversión</h1>
        <div style="background: #101827; color: white; padding: 20px; border-radius: 10px;">
            <input type="number" id="cap" placeholder="Capital" style="width:100%; padding:10px; margin-bottom:10px;">
            <button onclick="calc()" style="width:100%; background: #10B981; color: white; border: none; padding: 10px; font-weight: bold;">CALCULAR</button>
            <h2 id="res" style="text-align:center; margin-top:10px;">$0.00</h2>
        </div>
    </article>
</div>
<script>function calc(){ let v = document.getElementById('cap').value; document.getElementById('res').innerText = '$' + (v * 1.08).toFixed(2); }</script>
